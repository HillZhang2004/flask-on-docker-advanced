name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-dev-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build and start development stack
        run: |
          docker compose up -d --build

      - name: Wait for app to start
        run: sleep 10

      - name: Verify homepage responds
        run: |
          curl --fail http://localhost:8765/

      - name: Show container status on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs

      - name: Tear down stack
        if: always()
        run: |
          docker compose down -v
